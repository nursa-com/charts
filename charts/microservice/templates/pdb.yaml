apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ printf "pdb-%s" .Release.Name }}
spec:
  minAvailable: {{ if eq .Release.Namespace "stage0" }}1{{ else }}{{ if (hasKey .Values "pdbMinAvailable") }}{{ .Values.pdbMinAvailable }}{{ else }}1{{ end }}{{ end }}
  selector:
    matchLabels:
      app: {{ include "appname" . }}
---
{{- if and (hasKey .Values "worker") .Values.worker.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-worker-pdb
spec:
  {{- if hasKey .Values.worker "pdbMaxUnavailable" }}
  maxUnavailable: {{ .Values.worker.pdbMaxUnavailable }}
  {{- else if hasKey .Values.worker "pdbMinAvailable" }}
  minAvailable: {{ .Values.worker.pdbMinAvailable }}
  {{- else }}
  maxUnavailable: 1
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
{{- end }}