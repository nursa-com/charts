{{- if .Values.linked_service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.linked_service.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.linked_service.name }}
{{ include "linked_service.labels" $ | nindent 4 }}
  annotations:
{{ include "linked_service.annotations" $ | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.linked_service.name }}
  replicas: {{ .Values.linked_service.parameters.replicas }}
  template:
    metadata:
      labels:
        app: {{ .Values.linked_service.name }}
{{ include "linked_service.labels" $ | nindent 8 }}
      annotations:
{{ include "linked_service.annotations" $ | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.linked_service.parameters.serviceAccountName }}
      containers:
        - name: {{ .Values.linked_service.name }}
          image: {{ printf "%s:%s" .Values.linked_service.parameters.image.repository .Values.linked_service.parameters.image.tag }}
          ports:
            {{- range $port := .Values.linked_service.parameters.ports }}
            - containerPort: {{ $port.containerPort }}
            {{- end }}
          resources:
            requests:
              memory: {{ .Values.linked_service.parameters.resources.min_memory }}
              cpu: {{ .Values.linked_service.parameters.resources.min_cpu }}
            limits:
              memory: {{ .Values.linked_service.parameters.resources.max_memory }}
              cpu: {{ .Values.linked_service.parameters.resources.max_cpu }}
          {{- $lsProbe := .Values.linked_service.parameters.probeConfig | default dict }}
          {{- if .Values.linked_service.parameters.startupProbe }}
          startupProbe:
            {{- merge $lsProbe .Values.linked_service.parameters.startupProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.linked_service.parameters.livenessProbe }}
          livenessProbe:
            {{- merge $lsProbe .Values.linked_service.parameters.livenessProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.linked_service.parameters.readinessProbe }}
          readinessProbe:
            {{- merge $lsProbe .Values.linked_service.parameters.readinessProbe | toYaml | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $value := .Values.linked_service.parameters.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $secret := .Values.linked_service.parameters.secrets }}
            - name: {{ upper $secret | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret | replace "_" "-" }}
                  key: value
                  optional: false
            {{- end }}
          {{- if .Values.linked_service.parameters.secrets }}
          volumeMounts:
            - name: gcp-secret-store-vol
              mountPath: "/var/secrets-store"
          {{- end }}
      {{- if .Values.linked_service.parameters.secrets }}
      volumes:
        - name: gcp-secret-store-vol
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ printf "gcp-secrets-%s" (include "appname" .)}}
      {{- end }}
{{- end }}

{{- range $svc := .Values.linked_services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $svc.name }}
{{ include "linked_services.labels" (dict "name" $svc.name "ctx" $) | nindent 4 }}
  annotations:
{{ include "linked_services.annotations" (dict "name" $svc.name) | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ $svc.name }}
  replicas: {{ $svc.parameters.replicas }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
{{ include "linked_services.labels" (dict "name" $svc.name "ctx" $) | nindent 8 }}
      annotations:
{{ include "linked_services.annotations" (dict "name" $svc.name) | nindent 8 }}
    spec:
      serviceAccountName: {{ $svc.parameters.serviceAccountName | default (include "appname" $) }}
      containers:
        - name: {{ $svc.name }}
          image: {{ printf "%s:%s" $svc.parameters.image.repository (toString $svc.parameters.image.tag) }}
          ports:
            {{- range $port := $svc.parameters.ports }}
            - containerPort: {{ $port.containerPort }}
            {{- end }}
          resources:
            requests:
              memory: {{ $svc.parameters.resources.min_memory }}
              cpu: {{ $svc.parameters.resources.min_cpu }}
            limits:
              memory: {{ $svc.parameters.resources.max_memory }}
              cpu: {{ $svc.parameters.resources.max_cpu }}
          {{- $lsProbe := $svc.parameters.probeConfig | default dict }}
          {{- if $svc.parameters.startupProbe }}
          startupProbe:
            {{- merge $lsProbe $svc.parameters.startupProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.parameters.livenessProbe }}
          livenessProbe:
            {{- merge $lsProbe $svc.parameters.livenessProbe | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.parameters.readinessProbe }}
          readinessProbe:
            {{- merge $lsProbe $svc.parameters.readinessProbe | toYaml | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $value := $svc.parameters.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $secret := $svc.parameters.secrets }}
            - name: {{ upper $secret | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret | replace "_" "-" }}
                  key: value
                  optional: false
            {{- end }}
          {{- if $svc.parameters.secrets }}
          volumeMounts:
            - name: gcp-secret-store-vol
              mountPath: "/var/secrets-store"
          {{- end }}
      {{- if $svc.parameters.secrets }}
      volumes:
        - name: gcp-secret-store-vol
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ printf "gcp-secrets-%s" (include "appname" $) }}
      {{- end }}
{{- end }}
