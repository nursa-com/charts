name: claude-autofix-bridge

on:
  pull_request:
    types: [closed]

jobs:
  notify-agentic:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'claude-fix')
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch to nursa-agentic-workflows
        run: |
          echo "🚀 Claude-fix PR #${PR_NUM} merged!"
          echo "   Title: $PR_TITLE"
          echo "   URL: $PR_URL"
          echo ""
          echo "Dispatching to nursa-agentic-workflows..."

          RESPONSE=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/nursa-com/nursa-agentic-workflows/dispatches" \
            -d "$(jq -n \
              --arg pr_number "$PR_NUM" \
              --arg pr_title "$PR_TITLE" \
              --arg pr_url "$PR_URL" \
              --arg merge_sha "$MERGE_SHA" \
              '{
                "event_type": "claude-pr-merged",
                "client_payload": {
                  "pr_number": $pr_number,
                  "pr_title": $pr_title,
                  "pr_url": $pr_url,
                  "merge_sha": $merge_sha
                }
              }')" 2>&1)

          HTTP_STATUS="${RESPONSE: -3}"
          BODY="${RESPONSE:0:${#RESPONSE}-3}"

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "✅ Dispatch sent! (HTTP $HTTP_STATUS)"
          else
            echo "❌ Dispatch failed with HTTP $HTTP_STATUS"
            echo "Response: $BODY"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_REPO_ACCESS_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
